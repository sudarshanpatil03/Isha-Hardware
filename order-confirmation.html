<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Confirmed | Isha Hardware</title>
  <link rel="stylesheet" href="./style.css">
  <style>
    .success-icon { width: 80px; height: 80px; border-radius: 50%; background: #10b981; display: flex; align-items: center; justify-content: center; color: white; margin: 0 auto 2rem; box-shadow: 0 0 30px rgba(16, 185, 129, 0.4); animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }
    .receipt { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 3rem; margin-top: 2rem; text-align: left; }
    .receipt-row { display: flex; justify-content: space-between; padding: 1rem 0; border-bottom: 1px dashed var(--border); }
    .receipt-row:last-child { border-bottom: none; }
  </style>
</head>
<body>
  <div class="bg-glow"></div>

  <header class="header">
    <div class="container header-content">
      <a href="index.html" class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg>
        ISHA HARDWARE
      </a>
      <div class="nav-actions">
        <a href="index.html" class="btn btn-outline">Continue Shopping</a>
      </div>
    </div>
  </header>

  <main class="container" style="padding: 6rem 2rem; text-align: center; max-width: 800px; margin: 0 auto;">
    
    <div class="success-icon">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" class="cart-svg" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
    </div>
    
    <h1 style="font-size: 3rem; margin-bottom: 1rem;" class="text-gradient">Order Successful!</h1>
    <p style="color: var(--text-muted); font-size: 1.2rem; margin-bottom: 3rem;">Thank you for choosing Isha Hardware. Your order is being processed.</p>
    
    <div class="receipt">
      <h2 style="margin-bottom: 0.5rem; font-size: 1.25rem; color: var(--primary);">Order Details</h2>
      <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem;" id="orderMeta">Loading...</p>
      
      <div id="receiptItems"></div>
      
      <div class="receipt-row" style="margin-top: 1rem;">
        <span style="color: var(--text-muted);">Shipping</span>
        <span style="font-weight: 600;">₹50.00</span>
      </div>
      
      <div class="receipt-row" style="border-top: 2px solid var(--border); border-bottom: none; border-style: solid; margin-top: 1rem;">
        <span style="font-size: 1.25rem; font-weight: 700;">Total Paid</span>
        <span style="font-size: 1.25rem; font-weight: 800;" class="text-gradient-primary" id="receiptTotal">₹0.00</span>
      </div>
      
      <div style="margin-top: 3rem; background: rgba(0,0,0,0.2); padding: 1.5rem; border-radius: var(--radius); border: 1px solid var(--border);">
        <h3 style="font-size: 1rem; margin-bottom: 0.5rem;">Delivery Address</h3>
        <p style="color: var(--text-muted); font-size: 0.9rem; line-height: 1.6;" id="receiptAddress"></p>
      </div>
    </div>
    
    <div style="margin-top: 3rem;">
      <a href="orders.html" class="btn btn-primary" style="padding: 1rem 3rem;">View Order History</a>
    </div>

  </main>

  <script src="./script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const order = JSON.parse(localStorage.getItem('lastPlacedOrder'));
      
      if (!order) {
        window.location.href = 'index.html';
        return;
      }
      
      const dateStr = new Date(order.date).toLocaleDateString('en-IN', {
        year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit'
      });
      
      document.getElementById('orderMeta').innerHTML = `
        <strong>ID:</strong> ${order.id} &bull; <strong>Date:</strong> ${dateStr}<br>
        <strong>Payment:</strong> ${order.paymentMethod}
      `;
      
      const list = document.getElementById('receiptItems');
      order.items.forEach(item => {
        const div = document.createElement('div');
        div.className = 'receipt-row';
        div.innerHTML = `
          <span>${item.name} <span style="color: var(--text-muted);">x${item.quantity}</span></span>
          <span>₹${(item.price * item.quantity).toFixed(2)}</span>
        `;
        list.appendChild(div);
      });
      
      document.getElementById('receiptTotal').textContent = `₹${order.total.toFixed(2)}`;
      
      const addr = order.address;
      document.getElementById('receiptAddress').innerHTML = `
        ${addr.fname} ${addr.lname}<br>
        ${addr.street}, ${addr.city}, ${addr.pin}
      `;
    });
  </script>
</body>
</html>
