<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart | Isha Hardware</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="bg-glow"></div>

  <header class="header">
    <div class="container header-content">
      <a href="index.html" class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>
        </svg>
        ISHA HARDWARE
      </a>
      <div class="nav-actions">
        <a href="index.html" class="btn btn-outline">Back to Store</a>
        <a href="cart.html" class="btn btn-primary">
          <div class="cart-icon-wrapper">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" class="cart-svg" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle>
              <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
            </svg>
            <span class="cart-badge">0</span>
          </div>
          Cart
        </a>
      </div>
    </div>
  </header>

  <main class="container" style="padding: 4rem 2rem;">
    <h1 style="font-size: 2.5rem; margin-bottom: 2rem;">Shopping Cart</h1>
    
    <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 3rem;" class="cart-layout">
      
      <!-- Cart Items -->
      <div id="cartItemsList">
        <!-- JS injects cart items here -->
        <div style="text-align: center; padding: 4rem; background: var(--bg-card); border-radius: var(--radius-lg); border: 1px solid var(--border);" id="emptyCartMessage">
          <svg style="color: var(--text-muted); margin-bottom: 1rem;" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          <h3 style="margin-bottom: 1rem;">Your cart is empty</h3>
          <a href="index.html" class="btn btn-primary">Start Shopping</a>
        </div>
      </div>

      <!-- Order Summary -->
      <div style="background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 2rem; height: fit-content; position: sticky; top: 100px;">
        <h3 style="margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem;">Order Summary</h3>
        
        <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
          <span style="color: var(--text-muted);">Subtotal (<span id="summaryItemCount">0</span> items)</span>
          <span style="font-weight: 600;" id="summarySubtotal">₹0.00</span>
        </div>
        
        <div style="display: flex; justify-content: space-between; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 1.5rem;">
          <span style="color: var(--text-muted);">Shipping</span>
          <span style="font-weight: 600;">₹50.00</span>
        </div>
        
        <div style="display: flex; justify-content: space-between; margin-bottom: 2rem; font-size: 1.25rem;">
          <strong>Total</strong>
          <strong class="text-gradient-primary" id="summaryTotal">₹0.00</strong>
        </div>
        
        <button onclick="proceedToCheckout()" class="btn btn-primary" style="width: 100%; font-size: 1.1rem; padding: 1rem;">Proceed to Checkout→</button>
      </div>

    </div>
  </main>

  <script src="./script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', renderCart);

    function renderCart() {
      const list = document.getElementById('cartItemsList');
      const emptyMsg = document.getElementById('emptyCartMessage');
      
      if (cart.length === 0) {
        if(emptyMsg) emptyMsg.style.display = 'block';
        updateSummary();
        return;
      }
      
      if(emptyMsg) emptyMsg.style.display = 'none';
      list.innerHTML = '';
      
      cart.forEach((item, index) => {
        const div = document.createElement('div');
        div.style.cssText = 'display: flex; gap: 1.5rem; padding: 1.5rem; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 1rem; align-items: center;';
        div.innerHTML = `
          <div style="width: 100px; height: 100px; border-radius: var(--radius); background: #111; overflow: hidden; flex-shrink: 0;">
            <img src="${item.image}" style="width: 100%; height: 100%; object-fit: cover;" onerror="this.onerror=null; this.src='https://images.unsplash.com/photo-1581092160562-40aa08e78837?q=80&w=200';">
          </div>
          <div style="flex: 1;">
            <h3 style="font-size: 1.1rem; margin-bottom: 0.25rem;">${item.name}</h3>
            <p style="color: var(--text-muted); font-size: 0.9rem;">${item.category}</p>
          </div>
          <div style="display: flex; align-items: center; gap: 0.5rem; background: rgba(0,0,0,0.3); padding: 0.25rem; border-radius: var(--radius); border: 1px solid var(--border);">
            <button onclick="updateQty(${index}, -1)" style="background: none; border: none; color: #fff; width: 30px; height: 30px; cursor: pointer; border-radius: 6px;" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='transparent'">-</button>
            <span style="width: 30px; text-align: center; font-weight: 600;">${item.quantity}</span>
            <button onclick="updateQty(${index}, 1)" style="background: none; border: none; color: #fff; width: 30px; height: 30px; cursor: pointer; border-radius: 6px;" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='transparent'">+</button>
          </div>
          <div style="font-size: 1.25rem; font-weight: 700; width: 100px; text-align: right;">
            ₹${(item.price * item.quantity).toFixed(2)}
          </div>
          <button onclick="removeItem(${index})" style="background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 0.5rem;" onmouseover="this.style.color='#ef4444'" onmouseout="this.style.color='var(--text-muted)'">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
          </button>
        `;
        list.appendChild(div);
      });
      
      updateSummary();
    }

    function updateQty(index, change) {
      if (cart[index].quantity + change > 0) {
        cart[index].quantity += change;
      } else {
        cart.splice(index, 1);
      }
      saveCart();
      renderCart();
    }

    function removeItem(index) {
      cart.splice(index, 1);
      saveCart();
      renderCart();
    }

    function updateSummary() {
      const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
      const shipping = subtotal > 0 ? 50 : 0;
      
      document.getElementById('summaryItemCount').textContent = totalItems;
      document.getElementById('summarySubtotal').textContent = `₹${subtotal.toFixed(2)}`;
      document.getElementById('summaryTotal').textContent = `₹${(subtotal + shipping).toFixed(2)}`;
    }

    function proceedToCheckout() {
      if (cart.length === 0) {
        alert("Your cart is empty!");
        return;
      }
      if (!currentUser) {
        window.location.href = 'login.html?redirect=checkout.html';
        return;
      }
      window.location.href = 'checkout.html';
    }
  </script>

  <style>
    @media (max-width: 900px) {
      .cart-layout { grid-template-columns: 1fr !important; }
    }
  </style>
</body>
</html>
