<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Orders | Isha Hardware</title>
  <link rel="stylesheet" href="./style.css">
  <style>
    .order-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 2rem; margin-bottom: 1.5rem; transition: var(--transition); }
    .order-card:hover { border-color: rgba(255,255,255,0.15); }
    .order-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 1rem; }
    .order-id { font-size: 1.25rem; font-weight: 700; color: #fff; margin-bottom: 0.25rem; }
    .order-date { font-size: 0.9rem; color: var(--text-muted); }
    .order-status { display: inline-flex; align-items: center; padding: 0.4rem 1rem; border-radius: 100px; font-size: 0.8rem; font-weight: 700; background: rgba(16, 185, 129, 0.15); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); }
    .order-total { font-size: 1.5rem; font-weight: 800; color: #fff; text-align: right; }
    .order-items { display: grid; gap: 1rem; }
    .order-item-row { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 0; }
  </style>
</head>
<body>
  <div class="bg-glow"></div>

  <header class="header">
    <div class="container header-content">
      <a href="index.html" class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg>
        ISHA HARDWARE
      </a>
      <div class="nav-actions">
        <a href="index.html" class="btn btn-outline">Back to Store</a>
        <a href="cart.html" class="btn btn-primary">
          <div class="cart-icon-wrapper">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" class="cart-svg" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle>
              <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
            </svg>
            <span class="cart-badge">0</span>
          </div>
          Cart
        </a>
      </div>
    </div>
  </header>

  <main class="container" style="padding: 4rem 2rem; max-width: 900px; margin: 0 auto;">
    
    <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 3rem;">
      <div>
        <h1 style="font-size: 2.5rem; margin-bottom: 0.5rem;">Order History</h1>
        <p style="color: var(--text-muted); font-size: 1.1rem;">Track and review your past purchases.</p>
      </div>
    </div>

    <div id="ordersList">
      <!-- Orders injected via JS -->
      <div style="text-align: center; padding: 4rem; background: var(--bg-card); border-radius: var(--radius-lg); border: 1px solid var(--border);" id="emptyOrdersMessage" style="display: none;">
        <svg style="color: var(--text-muted); margin-bottom: 1rem;" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
        <h3 style="margin-bottom: 1rem;">No orders found</h3>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">You haven't placed any orders yet.</p>
        <a href="index.html" class="btn btn-primary">Start Shopping</a>
      </div>
    </div>

  </main>

  <script src="./script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // For demo, we just get from allOrders but normally we'd filter by user
      const allOrders = JSON.parse(localStorage.getItem('allOrders')) || [];
      const userOrders = currentUser ? allOrders.filter(o => o.userEmail === currentUser.email) : allOrders; // Show all if not logged in just for demo testing

      const list = document.getElementById('ordersList');
      const emptyMsg = document.getElementById('emptyOrdersMessage');

      if (userOrders.length === 0) {
        if (emptyMsg) emptyMsg.style.display = 'block';
        return;
      }
      
      if (emptyMsg) emptyMsg.style.display = 'none';
      list.innerHTML = '';
      
      userOrders.forEach(order => {
        const dateStr = new Date(order.date).toLocaleDateString('en-IN', {
          year: 'numeric', month: 'long', day: 'numeric'
        });
        
        const card = document.createElement('div');
        card.className = 'order-card';
        
        let itemsHtml = '';
        order.items.forEach(item => {
          itemsHtml += `
            <div class="order-item-row">
              <div style="display: flex; gap: 1rem; align-items: center;">
                <div style="width: 40px; height: 40px; border-radius: 6px; background: #111; overflow: hidden;">
                  <img src="${item.image}" style="width: 100%; height: 100%; object-fit: cover;" onerror="this.onerror=null; this.src='https://images.unsplash.com/photo-1581092160562-40aa08e78837?q=80&w=100';">
                </div>
                <div>
                  <div style="font-weight: 500; font-size: 0.95rem;">${item.name}</div>
                  <div style="color: var(--text-muted); font-size: 0.8rem;">Qty: ${item.quantity}</div>
                </div>
              </div>
              <div style="font-weight: 600;">₹${(item.price * item.quantity).toFixed(2)}</div>
            </div>
          `;
        });
        
        card.innerHTML = `
          <div class="order-header">
            <div>
              <div class="order-id">Order ${order.id}</div>
              <div class="order-date">Placed on ${dateStr} &bull; ${order.paymentMethod}</div>
            </div>
            <div style="text-align: right;">
              <div class="order-status">${order.status}</div>
              <div class="order-total" style="margin-top: 0.5rem;">₹${order.total.toFixed(2)}</div>
            </div>
          </div>
          <div class="order-items">
            <h4 style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 1px;">Items</h4>
            ${itemsHtml}
          </div>
        `;
        list.appendChild(card);
      });
    });
  </script>
</body>
</html>
