<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Isha Hardware</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="bg-glow"></div>

  <header class="header">
    <div class="container header-content">
      <a href="index.html" class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg>
        ISHA HARDWARE
      </a>
      <div class="nav-actions">
        <a href="index.html" class="btn btn-outline">Back to Store</a>
      </div>
    </div>
  </header>

  <main class="auth-wrapper">
    <div class="auth-card">
      <div style="text-align: center; margin-bottom: 2rem;">
        <h2 style="font-size: 2rem; margin-bottom: 0.5rem;" class="text-gradient">Welcome back</h2>
        <p style="color: var(--text-muted);">Sign in to your account</p>
      </div>
      
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label">Email address</label>
          <input type="email" id="email" class="form-control" required placeholder="name@example.com">
        </div>
        
        <div class="form-group" style="margin-bottom: 2rem;">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
            <label class="form-label" style="margin-bottom: 0;">Password</label>
            <a href="#" style="font-size: 0.8rem; color: var(--primary); text-decoration: none;">Forgot?</a>
          </div>
          <input type="password" id="password" class="form-control" required placeholder="••••••••">
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem;">Sign in</button>
      </form>
      
      <div style="margin-top: 2rem; text-align: center; font-size: 0.9rem; color: var(--text-muted); padding-top: 1.5rem; border-top: 1px solid var(--border);">
        <p style="margin-bottom: 1rem;">Don't have an account? <a href="#" style="color: var(--primary); text-decoration: none; font-weight: 600;">Sign up</a></p>

      </div>
    </div>
  </main>

  <script src="./script.js"></script>
  <script>
    function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const pass = document.getElementById('password').value;
      
      if (email.endsWith('@admin.com')) {
        // Admin user routing
        localStorage.setItem('currentAdmin', JSON.stringify({ email: email, name: email.split('@')[0] }));
        window.location.href = 'admin.html';
      } else {
        // Standard user routing
        localStorage.setItem('currentUser', JSON.stringify({ email: email, name: email.split('@')[0] }));
        
        // Check if there's a redirect query param
        const urlParams = new URLSearchParams(window.location.search);
        const redirect = urlParams.get('redirect');
        
        if (redirect) {
          window.location.href = redirect;
        } else {
          window.location.href = 'index.html';
        }
      }
    }
  </script>
</body>
</html>
